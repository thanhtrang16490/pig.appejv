<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#ffffff" rx="80" ry="80"/>
  
  <!-- Pig body -->
  <ellipse cx="256" cy="280" rx="140" ry="110" fill="#059669"/>
  
  <!-- Pig head -->
  <circle cx="256" cy="200" r="90" fill="#059669"/>
  
  <!-- Snout -->
  <ellipse cx="256" cy="220" rx="35" ry="25" fill="#047857"/>
  <circle cx="245" cy="220" r="6" fill="#ffffff"/>
  <circle cx="267" cy="220" r="6" fill="#ffffff"/>
  
  <!-- Eyes -->
  <circle cx="225" cy="185" r="10" fill="#ffffff"/>
  <circle cx="225" cy="185" r="5" fill="#1f2937"/>
  <circle cx="287" cy="185" r="10" fill="#ffffff"/>
  <circle cx="287" cy="185" r="5" fill="#1f2937"/>
  
  <!-- Ears -->
  <ellipse cx="175" cy="155" rx="25" ry="35" fill="#059669" transform="rotate(-30 175 155)"/>
  <ellipse cx="337" cy="155" rx="25" ry="35" fill="#059669" transform="rotate(30 337 155)"/>
  
  <!-- Legs -->
  <rect x="170" y="360" width="25" height="50" rx="10" fill="#059669"/>
  <rect x="220" y="370" width="25" height="50" rx="10" fill="#059669"/>
  <rect x="267" y="370" width="25" height="50" rx="10" fill="#059669"/>
  <rect x="317" y="360" width="25" height="50" rx="10" fill="#059669"/>
  
  <!-- Tail -->
  <path d="M 380 280 Q 420 260 410 300 Q 400 330 430 310" fill="none" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
</svg>
